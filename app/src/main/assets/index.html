<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Web shell</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 100%);
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 14px;
      padding-bottom: 180px;
    }

    .app-container {
      width: 100%;
      max-width: 520px;
      transition: all 0.2s ease;
    }

    .loading-screen {
      background: rgba(255, 245, 240, 0.92);
      backdrop-filter: blur(2px);
      border-radius: 64px;
      padding: 2rem 1.5rem;
      box-shadow: 0 20px 35px rgba(244, 143, 177, 0.25), 0 0 0 1px rgba(255, 220, 210, 0.6);
      text-align: center;
      margin-top: 14vh;
    }

    .loading-text {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #e6718e, #c95c7a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 28px;
      text-shadow: 0 1px 2px rgba(255, 200, 200, 0.6);
    }

    .spinner {
      width: 70px;
      height: 70px;
      margin: 0 auto 20px;
      position: relative;
    }

    .spinner-circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #ffb7c5, #ffd9c0, #ffb7c5);
      mask: radial-gradient(farthest-side, transparent calc(100% - 12px), #000 calc(100% - 10px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 12px), #000 calc(100% - 10px));
      animation: spin 0.9s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
      box-shadow: 0 0 8px rgba(255, 150, 170, 0.5);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-sub {
      font-size: 0.9rem;
      color: #e297ae;
      background: #fff0e8;
      display: inline-block;
      padding: 5px 14px;
      border-radius: 40px;
      margin-top: 10px;
    }

    .main-card {
      background: #fffaf7;
      border-radius: 48px 32px 56px 32px;
      box-shadow: 0 25px 40px rgba(218, 128, 148, 0.25), 0 2px 6px rgba(243, 182, 186, 0.3);
      overflow: hidden;
      border: 1px solid #ffddcf;
    }

    .hero-section {
      padding: 2rem 1.5rem 1.8rem;
      text-align: center;
      background: linear-gradient(120deg, #ffeaeef5 0%, #ffe2e6 100%);
      border-bottom: 2px dashed #ffc1bc;
    }

    .yura-avatar {
      font-size: 4.6rem;
      filter: drop-shadow(0 10px 12px rgba(201, 112, 124, 0.3));
      margin-bottom: 12px;
    }

    .status-title {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(125deg, #d46b8a, #b55373);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .sub-status {
      background: #ffe8e2;
      padding: 8px 16px;
      border-radius: 80px;
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #c26582;
    }

    .detail-panel {
      padding: 24px 22px 24px;
    }

    .cmd-area {
      background: #fff3ef;
      border-radius: 28px;
      padding: 14px 18px;
      margin-bottom: 16px;
      border: 1px solid #ffdad2;
      box-shadow: inset 0 1px 3px #fbc2bf30, 0 2px 5px rgba(0,0,0,0.02);
    }

    .cmd-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #e68aa6;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    pre {
      background: #2e2227;
      color: #ffcfaf;
      font-family: 'JetBrains Mono', monospace;
      padding: 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      border-left: 6px solid #ffa1b5;
      margin-top: 5px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow-y: auto;
      min-height: 180px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .pink-btn {
      background: #f49dbb;
      border: none;
      padding: 12px 22px;
      border-radius: 100px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #2f1d24;
      box-shadow: 0 6px 0 #aa6f84;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
      min-width: 84px;
      flex: 1 1 96px;
      touch-action: manipulation;
    }

    .pink-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #aa6f84;
    }

    .beige-btn {
      background: #ffddcf;
      border: 1px solid #ffbfae;
      padding: 12px 16px;
      border-radius: 100px;
      font-weight: 600;
      color: #b34b6b;
      cursor: pointer;
      min-width: 82px;
      flex: 1 1 82px;
      touch-action: manipulation;
      box-shadow: 0 5px 0 #d9a593;
    }

    .beige-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #d9a593;
      background: #ffcfbd;
    }

    .beige-btn:disabled,
    .pink-btn:disabled {
      opacity: 0.55;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      font-size: 0.7rem;
      color: #d494aa;
    }

    .command-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 80;
      background: rgba(255, 245, 240, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid #ffcfd3;
      box-shadow: 0 -8px 20px rgba(170, 111, 132, 0.2);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom, 0px));
    }

    .dock-inner {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }

    .input-wrap {
      margin-bottom: 8px;
    }

    .cmd-input {
      width: 100%;
      min-height: 42px;
      max-height: 90px;
      resize: vertical;
      border: 1px solid #ffb9c6;
      border-radius: 16px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
      color: #402934;
      background: #fffdfd;
    }

    .cmd-input:focus {
      outline: none;
      border-color: #f19ab9;
      box-shadow: 0 0 0 2px #ffd6e3;
    }

    .dock-hint {
      margin-top: 7px;
      text-align: center;
      font-size: 0.72rem;
      color: #bf7493;
    }

    @media (max-width: 420px) {
      body {
        padding: 10px;
        padding-bottom: 190px;
      }
      .detail-panel {
        padding: 18px 14px 18px;
      }
      .hero-section {
        padding: 1.5rem 1.1rem 1.3rem;
      }
      .status-title {
        font-size: 1.55rem;
      }
      .yura-avatar {
        font-size: 3.9rem;
      }
      .loading-text {
        font-size: 1.45rem;
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
<div class="app-container" id="appContainer">
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-text">✨ 正在尝试访问由良酱... ✨</div>
    <div class="spinner">
      <div class="spinner-circle"></div>
    </div>
    <div class="loading-sub">🌸 悄悄靠近中 🌸</div>
  </div>

  <div id="mainInterface" class="hidden">
    <div class="main-card">
      <div class="hero-section">
        <div class="yura-avatar">🐾🌸 由良酱 🌸🐾</div>
        <div class="status-title" id="mainStatusTitle">由良酱已无力反抗</div>
        <div class="sub-status" id="subStatusText">💗 软乎乎地被驯服 💗</div>
      </div>
      <div class="detail-panel">
        <div class="cmd-area">
          <div class="cmd-label">
            <span>💻 ROOT 探测回显</span> <span style="font-size:12px;">⚡</span>
          </div>
          <pre id="rootResultBlock">尚未执行命令</pre>
        </div>
        <div class="footer-note">
          💕 粉肤结界 · 由良酱的契约 💕
        </div>
      </div>
    </div>
  </div>
</div>

<div class="command-dock" id="commandDock">
  <div class="dock-inner">
    <div class="input-wrap">
      <textarea id="cmdInput" class="cmd-input" placeholder="输入命令，例如：whoami" spellcheck="false">whoami</textarea>
    </div>
    <div class="button-group">
      <button class="beige-btn" id="historyUpBtn">⬆ 上一条</button>
      <button class="beige-btn" id="historyDownBtn">⬇ 下一条</button>
      <button class="pink-btn" id="runBtn">🖤 执行命令 🖤</button>
      <button class="beige-btn" id="clearBtn">🍬 清除输出</button>
    </div>
    <div class="dock-hint">Enter 执行，Shift+Enter 换行，箭头可切换命令历史</div>
  </div>
</div>

<script>
  const COMMAND_HISTORY_KEY = 'webshell_command_history_v1';
  const OUTPUT_HISTORY_KEY = 'webshell_output_history_v1';
  const MAX_COMMAND_HISTORY = 100;
  const DEFAULT_OUTPUT = '尚未执行命令';

  const loadingScreen = document.getElementById('loadingScreen');
  const mainInterface = document.getElementById('mainInterface');
  const mainStatusTitle = document.getElementById('mainStatusTitle');
  const subStatusText = document.getElementById('subStatusText');
  const rootResultBlock = document.getElementById('rootResultBlock');

  let commandHistory = [];
  let historyIndex = null;
  let draftBeforeHistory = '';
  let currentRootSuccess = false;

  function root_cmd(mycmd) {
    const raw = NativeBridge.root_cmd(mycmd);
    return JSON.parse(raw);
  }

  function updateMainUI() {
    if (currentRootSuccess) {
      mainStatusTitle.textContent = '由良酱已无力反抗';
      subStatusText.textContent = '💘 瘫软在掌心 任你摆布 💘';
    } else {
      mainStatusTitle.textContent = '由良酱开启龙脊背模式';
      subStatusText.textContent = '🐉 炸毛哈气 超凶的！ 🐉';
    }
  }

  function detectRootStatus() {
    try {
      const result = root_cmd('whoami');
      const stdout = String(result[0] || '');
      const code = Number(result[2]);
      currentRootSuccess = (code === 0 && stdout.toLowerCase().includes('root'));
    } catch (err) {
      currentRootSuccess = false;
    }
    updateMainUI();
  }

  function getPromptByStatus() {
    return currentRootSuccess ? '#' : '$';
  }

  function saveCommandHistory() {
    localStorage.setItem(COMMAND_HISTORY_KEY, JSON.stringify(commandHistory));
  }

  function saveOutputHistory(text) {
    localStorage.setItem(OUTPUT_HISTORY_KEY, text);
  }

  function updateHistoryButtons() {
    const hasHistory = commandHistory.length > 0;
    document.getElementById('historyUpBtn').disabled = !hasHistory;
    document.getElementById('historyDownBtn').disabled = !hasHistory;
  }

  function rememberCommand(cmd) {
    if (!cmd) return;

    const last = commandHistory.length ? commandHistory[commandHistory.length - 1] : '';
    if (cmd !== last) {
      commandHistory.push(cmd);
      if (commandHistory.length > MAX_COMMAND_HISTORY) {
        commandHistory = commandHistory.slice(commandHistory.length - MAX_COMMAND_HISTORY);
      }
      saveCommandHistory();
    }

    historyIndex = null;
    draftBeforeHistory = '';
    updateHistoryButtons();
  }

  function moveHistory(step) {
    const inputEl = document.getElementById('cmdInput');
    if (commandHistory.length === 0) return;

    if (historyIndex === null) {
      draftBeforeHistory = inputEl.value;
      historyIndex = commandHistory.length;
    }

    const nextIndex = historyIndex + step;
    if (nextIndex < 0 || nextIndex > commandHistory.length) return;

    historyIndex = nextIndex;
    if (historyIndex === commandHistory.length) {
      inputEl.value = draftBeforeHistory;
      historyIndex = null;
    } else {
      inputEl.value = commandHistory[historyIndex];
    }

    inputEl.focus();
    inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
  }

  function formatExecutionOutput(stdout, stderr) {
    const out = String(stdout || '').trim();
    const err = String(stderr || '').trim();

    if (out && err) return out + '\n' + err;
    if (out) return out;
    if (err) return err;
    return '';
  }

  function appendOutput(block) {
    const current = (rootResultBlock.textContent === DEFAULT_OUTPUT) ? '' : rootResultBlock.textContent;
    const next = current ? current + '\n\n' + block : block;
    rootResultBlock.textContent = next || DEFAULT_OUTPUT;
    rootResultBlock.scrollTop = rootResultBlock.scrollHeight;
    saveOutputHistory(next);
  }

  function clearOutput() {
    rootResultBlock.textContent = DEFAULT_OUTPUT;
    saveOutputHistory('');
  }

  function loadState() {
    try {
      const historyRaw = localStorage.getItem(COMMAND_HISTORY_KEY);
      if (historyRaw) {
        const parsed = JSON.parse(historyRaw);
        if (Array.isArray(parsed)) {
          commandHistory = parsed.filter(function(item) {
            return typeof item === 'string' && item.trim() !== '';
          });
        }
      }
    } catch (e) {}

    try {
      const outputRaw = localStorage.getItem(OUTPUT_HISTORY_KEY);
      if (typeof outputRaw === 'string' && outputRaw.trim() !== '') {
        rootResultBlock.textContent = outputRaw;
      } else {
        rootResultBlock.textContent = DEFAULT_OUTPUT;
      }
    } catch (e) {
      rootResultBlock.textContent = DEFAULT_OUTPUT;
    }
  }

  function updateOutputHeight() {
    const dock = document.getElementById('commandDock');
    if (!dock || !rootResultBlock) return;

    const top = rootResultBlock.getBoundingClientRect().top;
    const dockTop = dock.getBoundingClientRect().top;
    const available = Math.floor(dockTop - top - 18);

    const minHeight = 170;
    const maxHeight = 560;
    const finalHeight = Math.max(minHeight, Math.min(maxHeight, available));
    rootResultBlock.style.height = finalHeight + 'px';
  }

  function runCommand() {
    const inputEl = document.getElementById('cmdInput');
    const cmd = inputEl.value.trim();
    if (!cmd) return;

    try {
      const result = root_cmd(cmd);
      const stdout = result[0];
      const stderr = result[1];
      const code = Number(result[2]);

      if (cmd.toLowerCase() === 'whoami') {
        const outText = String(stdout || '').toLowerCase();
        currentRootSuccess = (code === 0 && outText.includes('root'));
        updateMainUI();
      }

      const prompt = getPromptByStatus();
      const outputText = formatExecutionOutput(stdout, stderr);
      appendOutput(prompt + ' ' + cmd + (outputText ? '\n' + outputText : ''));
      rememberCommand(cmd);
      inputEl.value = '';
    } catch (err) {
      const prompt = getPromptByStatus();
      appendOutput(prompt + ' ' + cmd + '\n' + String(err));
      rememberCommand(cmd);
      inputEl.value = '';
    }
  }

  function bindEvents() {
    const inputEl = document.getElementById('cmdInput');
    const upBtn = document.getElementById('historyUpBtn');
    const downBtn = document.getElementById('historyDownBtn');
    const runBtn = document.getElementById('runBtn');
    const clearBtn = document.getElementById('clearBtn');

    upBtn.addEventListener('click', function() { moveHistory(-1); });
    downBtn.addEventListener('click', function() { moveHistory(1); });
    runBtn.addEventListener('click', runCommand);
    clearBtn.addEventListener('click', clearOutput);

    inputEl.addEventListener('input', function() {
      if (historyIndex !== null) historyIndex = null;
    });

    inputEl.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        runCommand();
      }
    });
  }

  function startApp() {
    loadState();
    bindEvents();
    updateHistoryButtons();

    setTimeout(function() {
      detectRootStatus();
      loadingScreen.classList.add('hidden');
      mainInterface.classList.remove('hidden');
      updateOutputHeight();
    }, 1000);
  }

  window.addEventListener('load', startApp);
  window.addEventListener('resize', updateOutputHeight);
</script>
</body>
</html>
